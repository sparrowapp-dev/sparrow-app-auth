apiVersion: apps/v1
kind: Deployment
metadata:
  name: sparrow-auth-preview-pr-${PR_NUMBER}
  namespace: sparrow-dev-preview
  labels:
    app: sparrow-auth-preview
    pr: "${PR_NUMBER}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sparrow-auth-preview-pr-${PR_NUMBER}
  template:
    metadata:
      labels:
        app: sparrow-auth-preview-pr-${PR_NUMBER}
    spec:
      containers:
      - name: sparrow-auth
        image: sparrowprod.azurecr.io/sparrow-auth:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
