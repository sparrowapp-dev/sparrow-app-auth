apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sparrow-auth-preview-pr-${PR_NUMBER}
  namespace: sparrow-dev-preview
  labels:
    app: sparrow-auth-preview
    pr: "${PR_NUMBER}"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - auth-pr-${PR_NUMBER}.preview.sparrowapp.dev
    secretName: auth-preview-pr-${PR_NUMBER}-tls
  rules:
  - host: auth-pr-${PR_NUMBER}.preview.sparrowapp.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sparrow-auth-preview-pr-${PR_NUMBER}
            port:
              number: 80
